const catLabels = {
  cinematic: "🎬 シネマティック・写真系",
  anime: "🎌 アニメ・イラスト・デジタルアート系",
  painting: "🖼️ 絵画・美術スタイル系",
  dark: "🔮 ファンタジー・ダーク・ホラー系",
  future: "🤖 未来・SF・サイバーパンク系",
  game: "🎮 ゲーム系",
  "3d": "🧊 3D・テクスチャ・ピクセル系",
  paper: "📄 ペーパークラフト系",
  ads: "📢 広告・ビジネス系",
  misc: "✨ その他・雰囲気・デザイン系"
};

const catOrder = ["cinematic","anime","painting","dark","future","game","3d","paper","ads","misc"];

let currentFilter = "all";

function renderGallery() {
  const gallery = document.getElementById("gallery");
  const search = document.getElementById("searchInput").value.toLowerCase();
  gallery.innerHTML = "";

  for (const cat of catOrder) {
    const items = styles.filter(s => {
      const matchCat = (currentFilter === "all" || s.cat === currentFilter);
      const matchSearch = !search || s.name.toLowerCase().includes(search) || s.desc.toLowerCase().includes(search);
      return s.cat === cat && matchCat && matchSearch;
    });

    if (items.length === 0) continue;

    const title = document.createElement("div");
    title.className = "category-title";
    title.textContent = catLabels[cat] + ` (${items.length})`;
    gallery.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "grid";

    for (const item of items) {
      const card = document.createElement("div");
      card.className = "card";
      card.style.cursor = "pointer";
      card.title = "クリックしてプロンプトを表示";
      card.onclick = () => openModal(item.name);
      card.innerHTML = `
        <img src="style_icons/${item.file.replace(/ /g, '_')}.png" alt="${item.name}" loading="lazy" onerror="this.src='style_icons/${item.file}.png'">
        <div class="card-body">
          <div class="card-name" title="${item.name}">${item.name}</div>
          <div class="card-desc">${item.desc}</div>
        </div>
      `;
      grid.appendChild(card);
    }
    gallery.appendChild(grid);
  }
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderGallery();
}

function filterCards() {
  renderGallery();
}

renderGallery();

function openModal(name) {
  const item = styles.find(s => s.name === name);
  if (!item) return;
  document.getElementById('modalTitle').textContent = item.name;
  
  const safeFile = item.file.replace(/ /g, '_');
  const imgElement = document.getElementById('modalImg');
  imgElement.src = `style_icons/${safeFile}.png`;
  imgElement.onerror = function() { this.src = `style_icons/${item.file}.png`; };

  const promptText = document.getElementById('modalPrompt');
  if (item.prompt && item.prompt.trim() !== '') {
    let escaped = item.prompt.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    promptText.innerHTML = escaped.replace(/\n/g, '<br>').replace(/\[prompt\]/g, '<strong style="color: #fbbf24;">[prompt]</strong>');
  } else {
    promptText.innerHTML = '<span class="prompt-empty">なし</span>';
  }

  const negText = document.getElementById('modalNeg');
  if (item.neg && item.neg.trim() !== '') {
    let escapedNeg = item.neg.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    negText.innerHTML = escapedNeg.replace(/\n/g, '<br>');
  } else {
    negText.innerHTML = '<span class="prompt-empty">なし</span>';
  }
  
  document.getElementById('promptModal').classList.add('show');
  document.body.style.overflow = 'hidden'; // 背景スクロール防止
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('promptModal').classList.remove('show');
  document.body.style.overflow = 'auto'; // 背景スクロール復活
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

</script>

<div id="promptModal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header">
      <img id="modalImg" src="" alt="">
      <div class="modal-title" id="modalTitle">Style Name</div>
    </div>
    <div class="prompt-box">
      <div class="prompt-label">✨ Prompt (プロンプト)</div>
      <div class="prompt-text" id="modalPrompt"></div>
    </div>
    <div class="prompt-box">
      <div class="prompt-label">🚫 Negative Prompt (ネガティブプロンプト)</div>
      <div class="prompt-text" id="modalNeg"></div>
    </div>
  </div>
</div>
